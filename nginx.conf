server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Forzar HTTPS: si la petición original llegó por HTTP (lo dice el edge de Railway
    # vía X-Forwarded-Proto), redirige 301 a HTTPS. Si llegó por HTTPS, no hace nada
    # (sin riesgo de redirect loop porque el if es estricto a "http").
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # Cabeceras de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: max-age conservador (1 día) hasta confirmar que TODO el tráfico HTTPS
    # funciona bien en apex + www. Subir a 31536000 más adelante.
    add_header Strict-Transport-Security "max-age=86400" always;

    # Gzip
    gzip on;
    gzip_types text/css text/javascript application/javascript image/svg+xml;

    # Cache: assets estáticos un año
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache: HTML sin caché
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    # Rutas limpias
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
